<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Número</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="box">
    <h1>Adivinhe o Número!</h1>

    <h2>Você tem 10 tentativas para adivinhar o número secreto entre 1 e 100.</h2>

    <label for="number">Digite um número entre 1 e 100:</label>
    <input type="number" id="number" min="1" max="100">

    <button onclick="checkNumber()">Enviar</button>
    <p id="result"></p>
    <p>Tentativas restantes: <span id="tentativas">10</span></p>
</div>

<script src="teste.js" defer></script>
</body>
</html>
